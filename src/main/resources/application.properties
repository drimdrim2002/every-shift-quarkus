# 1. 포트 설정 (Cloud Run의 $PORT 환경변수를 쓰되, 없으면 8080 사용)
quarkus.http.port=${PORT:8080}
quarkus.http.host=0.0.0.0

# 2. 배포를 쉽게 하기 위해 'Uber-Jar' 모드로 빌드 설정
quarkus.package.type=uber-jar

# --- Cloud Run Job Configuration ---
# HTTP 서버 비활성화 (Command Mode)
quarkus.http.enabled=false

# Jib 컨테이너 이미지 설정
quarkus.container-image.build=true
quarkus.container-image.push=true
quarkus.container-image.image=asia-northeast3-docker.pkg.dev/every-shift-api/containers/hello-world-job:v1
