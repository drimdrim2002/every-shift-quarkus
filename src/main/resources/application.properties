# 1. http port
quarkus.http.port=${PORT:8080}
quarkus.http.host=0.0.0.0

#2 time out
quarkus.http.read-timeout=30m
quarkus.http.idle-timeout=30m




# 2. 배포를 쉽게 하기 위해 'Uber-Jar' 모드로 빌드 설정
