# 1. http port
quarkus.http.port=${PORT:8080}
quarkus.http.host=0.0.0.0
#2 time out
quarkus.http.read-timeout=PT30M
quarkus.http.idle-timeout=PT30M
# 2. 배포 최적화를 위해 fast-jar 모드 사용
quarkus.package.jar.enabled=true
quarkus.package.jar.type=fast-jar
# Jib 컨테이너 이미지 설정
quarkus.container-image.build=true
quarkus.container-image.push=true
# quarkus.container-image.image=asia-northeast3-docker.pkg.dev/every-shift-api/containers/hello-world-job:v1
# --- Application Configuration ---
# Default mode is API. Set to JOB for Cloud Run Job execution.
app.mode=${APP_MODE:API}
# Dispatch mode: CLOUD_RUN_JOB (default), CLOUD_TASKS (fallback)
app.dispatch.mode=${APP_DISPATCH_MODE:CLOUD_RUN_JOB}
# If true, runs the solver logic locally via WorkerResource (Async) instead of Cloud Tasks.
# In production, this must remain false and Cloud Tasks path should be used.
app.solver.run-locally=false
# --- Google Cloud Configuration ---
# H2? ??? DB? ?? (?? ???)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb
gcp.project-id=every-shift-api
gcp.location-id=asia-northeast3
gcp.run.region=${GCP_RUN_REGION:${gcp.location-id}}
gcp.run.job-name=${GCP_RUN_JOB_NAME:every-shift-job}
gcp.queue-id=solver-queue
# 내부 Worker 호출용 Cloud Run URL. 프런트엔드 API Base URL과 혼용하지 않는다.
# 외부 프런트엔드에서는 https://every-shift-api-service-554455861916.asia-northeast3.run.app 를 사용한다.
gcp.worker-url=https://every-shift-api-service-x3l5zfq7ya-du.a.run.app/worker/process
gcp.service-account-email=every-shift-solver-invoker@every-shift-api.iam.gserviceaccount.com
# --- Firestore Configuration ---
gcp.firestore.collection=job-executions
quarkus.google.cloud.project-id=every-shift-api
quarkus.google.cloud.firestore.database-id=default
# Firestore Emulator (for local development)
# quarkus.google.firestore.emulator-host=localhost:8081
# quarkus.google.firestore.project-id=every-shift-api
# --- Solver Custom Configuration ---
# Default / Prod
solver.termination.spent-limit=60
solver.termination.unimproved-spent-limit=10
solver.termination.best-score-feasible=false
solver.termination.best-score-limit=[0]hard/[0/0/0]soft
solver.move-thread-count=AUTO
solver.environment-mode=REPRODUCIBLE
solver.random-seed=42
# Incremental Solver 설정
solver.incremental.enabled=true
solver.incremental.iteration-seconds=30
solver.incremental.max-total-minutes=10
solver.incremental.min-iterations=2
solver.incremental.max-iterations=30
# Dev profile
%dev.quarkus.live-reload.debug-host=0.0.0.0
%dev.app.solver.run-locally=true
%dev.solver.termination.spent-limit=10
%dev.solver.termination.unimproved-spent-limit=5
# Test profile
%test.solver.termination.spent-limit=60
%test.solver.termination.unimproved-spent-limit=10
# --- Export Configuration ---
# Markdown export output directory
app.export.output-dir=${EXPORT_DIR:target/schedule-output}
# Enable/disable markdown export
app.export.enabled=true
# --- CORS Configuration ---
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:8080,http://localhost:3000,http://localhost:5173,http://localhost:5174,https://*.run.app,https://every-shift-mvp.vercel.app,https://every-shift-mvp-git-main-sindeaf-2002s-projects.vercel.app,https://www.everyshift.co.kr
quarkus.http.cors.methods=GET,POST,OPTIONS,PUT,DELETE
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with,x-execution-id
quarkus.http.cors.exposed-headers=x-execution-id
quarkus.http.cors.access-control-max-age=PT24H
quarkus.http.test-port=0
quarkus.http.test-ssl-port=0
